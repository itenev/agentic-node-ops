# nginx-docker-filter.conf
# Phase 4: Fine-grained Docker API filtering for the socket-proxy.
# Allows all GET requests, but restricts POST requests to only /containers/{name}/restart.

map "$request_method:$request_uri" $docker_allowed {
    default                                         0;
    "~^GET:"                                        1;
    "~^POST:/containers/[^/]+/restart(\\?.*)?$"     1;
}

server {
    listen 2376;

    if ($docker_allowed = 0) {
        return 403;
    }

    location / {
        proxy_pass         http://docker-socket-proxy:2375;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }
}
