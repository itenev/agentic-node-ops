id: validator_duty_misses
description: Validator is missing attestation or proposal duties.
triggers:
  - alert_type: validator_duty_misses
    min_severity: low
diagnostics:
  - id: check_validator_status
    cmd: "curl -s http://validator:5062/eth/v1/validator/status"
    description: "Check validator client status"
    timeout: 5s
suggested_actions:
  - id: restart_validator
    description: "Restart the validator client"
    cmd: "docker restart validator"
    risk: low
    reversible: true
    requires_approval: true
    approval_timeout: 15m